name: Retraining Model CI

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/**'

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow and Dependencies
        run: |
          pip install mlflow==2.19.0 tensorflow==2.19.0 matplotlib

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/MSML-Fruits-Classification.mlflow
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Upload Artefak Model ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: cnn-fruits-model
          path: MLProject/my_model_dir/

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image using MLflow
        run: |
          cd MLProject
          mlflow models build-docker -m my_model_dir -n adji1112/msml-fruits-model:latest --env-manager local
          docker push adji1112/msml-fruits-model:latest